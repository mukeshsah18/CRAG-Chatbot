services:
  - type: web
    name: crag-ioe-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt && python backend/ingest.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: https://crag-ioe-chatbot.onrender.com
      - key: GROQ_API_KEY
        sync: false
