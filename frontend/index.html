<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAG IOE Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-block">
                <img src="/logo.png" alt="CRAG logo" class="brand-logo" />
                <div>
                    <h1>CRAG IOE Chatbot</h1>
                    <p>IOE Syllabus Assistant</p>
                </div>
            </div>

            <div class="sidebar-actions">
                <button id="new-chat-btn" class="new-chat-btn">+ Create Chat</button>
                <button id="clear-history-btn" class="clear-history-btn" type="button">Clear History</button>
            </div>

            <div class="history-head">History</div>
            <ul id="history-list" class="history-list"></ul>
        </aside>

        <main class="workspace">
            <header class="topbar">
                <div class="topbar-left">
                    <img src="/logo.png" alt="CRAG logo" class="topbar-logo" />
                    <h2 id="chat-title" class="chat-title">Conversation</h2>
                </div>

                <div class="theme-control">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select" aria-label="Theme">
                        <option value="system">System</option>
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </div>
            </header>

            <section id="chat-box" class="chat-box"></section>

            <form id="composer-form" class="composer" autocomplete="off">
                <textarea id="user-input" rows="1" placeholder="Type your question..."></textarea>
                <button id="send-btn" type="submit">Send</button>
            </form>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
